name: Deploy backend to Azure Container Apps

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/azure-container-apps.yml"]
  workflow_dispatch:

env:
  RESOURCE_GROUP: netcode-rg
  CONTAINER_APP_NAME: netcode-api
  IMAGE: ghcr.io/${{ github.repository_owner }}/netcode-api

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ env.IMAGE }}:${{ github.sha }},${{ env.IMAGE }}:latest

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }}:${{ github.sha }}
